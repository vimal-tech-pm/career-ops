                  - strong [ref=e137]: WHY WE NEED YOU? GLAD YOU ASKED...
                - paragraph [ref=e138]
                - paragraph [ref=e139]: As a key contributor to our AI transformation, you will act as a bridge between business goals and technical execution. We are seeking a hands-on, product-minded leader to support the development of governance frameworks, contribute to roadmap prioritization, and execute on AI initiatives that move AI from a buzzword to a core business advantage.
                - paragraph [ref=e140]: You are someone who can translate strategy into execution, capable of delivering high-value minimal viable products (MVPs) while supporting the evolution of our AI operating model.
                - paragraph [ref=e141]
                - paragraph [ref=e142]:
                  - emphasis [ref=e143]:
                    - strong [ref=e144]: Please note we are only considering candidates who are eligible to work in Canada and are currently located in the Greater Toronto Area.
                - paragraph [ref=e145]
                - strong [ref=e146]: WHAT IS THE DAY TO DAY LIKE
                - paragraph [ref=e147]:
                  - strong [ref=e148]: Strategic Support & Advisory
                - list [ref=e149]:
                  - listitem [ref=e150]:
                    - paragraph [ref=e151]:
                      - strong [ref=e152]: Steering Committee
                      - text: ": Support the establishment and facilitation of a cross-functional AI Steering Committee, helping coordinate intake, prioritization, and lifecycle tracking of AI initiatives & enterprise-wide projects"
                  - listitem [ref=e153]:
                    - paragraph [ref=e154]:
                      - strong [ref=e155]: Project Vetting
                      - text: ": Contribute to the development and refinement of evaluation frameworks for AI initiatives, including ROI, security, technical feasibility, and risk"
                  - listitem [ref=e156]:
                    - paragraph [ref=e157]:
                      - strong [ref=e158]: "AI Ambassador:"
                      - text: Act as a trusted partner and AI advocate to stakeholders, coaching teams on how to effectively adopt and apply AI tools within their workflows, and helping translate business needs into practical use cases
                - paragraph [ref=e159]:
                  - strong [ref=e160]: Execution & Technical Delivery
                - list [ref=e161]:
                  - listitem [ref=e162]:
                    - paragraph [ref=e163]:
                      - strong [ref=e164]: AI Architecture
                      - text: ": Lead the implementation of AI tools and solutions, ensuring integration into existing tech systems with strong performance, security, and data flow"
                  - listitem [ref=e165]:
                    - paragraph [ref=e166]:
                      - strong [ref=e167]: Data Alignment
                      - text: ": Partner closely with Data Engineering teams to execute against a clean and scalable data architecture"
                  - listitem [ref=e168]:
                    - paragraph [ref=e169]: Own delivery of Minimal Viable Products (MVPs) and pilot use cases, iterating based on feedback and performance
                - paragraph [ref=e170]:
                  - strong [ref=e171]: Organizational Growth & Adoption
                - list [ref=e172]:
                  - listitem [ref=e173]:
                    - paragraph [ref=e174]:
                      - strong [ref=e175]: "Departmental AI Guilds:"
                      - text: Lead the rollout and evolution of internal AI enablement initiatives, including launching and facilitating “AI Guilds” across key business units (e.g., Sales, HR, Finance), identifying and mentoring power users to act as local implementation leads
                  - listitem [ref=e176]:
                    - paragraph [ref=e177]:
                      - strong [ref=e178]: Departmental Design
                      - text: ": Collaborate with Head of AI & stakeholders on organizational planning, providing input into future capability and hiring needs (12-24 months) based on emerging priorities and workload"
                - paragraph [ref=e179]
                - strong [ref=e180]: WE ARE HOPING YOU HAVE
                - paragraph [ref=e181]:
                  - strong [ref=e182]: Strategic Leadership & "Builder" Experience
                - list [ref=e183]:
                  - listitem [ref=e184]:
                    - paragraph [ref=e185]: 7+ years in technical operations, digital transformation, product, or related fields, with a proven builder mindset and experience contributing to the launch or scaling of new initiatives or functions
                  - listitem [ref=e186]:
                    - paragraph [ref=e187]: Demonstrated ability to lead cross-functional initiatives or working groups, manage stakeholder expectations, and influence decision-making related to AI adoption
                  - listitem [ref=e188]:
                    - paragraph [ref=e189]: Experience operating in ambiguous, fast-paced environments, with the ability to drive clarity, alignment, and execution
                - paragraph [ref=e190]:
                  - strong [ref=e191]: AI Systems Architecture & Lifecycle Management
                - list [ref=e192]:
                  - listitem [ref=e193]:
                    - paragraph [ref=e194]: Hands-on experience supporting or delivering Generative AI solutions from data ingestion and RAG (Retrieval-Augmented Generation) architecture to production-grade deployment.
                  - listitem [ref=e195]:
                    - paragraph [ref=e196]: Practical expertise in working across the full AI product lifecycle, including development, deployment, and optimization
                  - listitem [ref=e197]:
