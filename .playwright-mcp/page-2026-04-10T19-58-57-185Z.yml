                - list [ref=e201]:
                  - listitem [ref=e202]:
                    - paragraph [ref=e203]: Skilled in bridging AI models with existing business systems (CRM, ERP, etc.) via secure API management, MCPs, and custom middleware.
                  - listitem [ref=e204]:
                    - paragraph [ref=e205]: Proven experience partnering with Data Engineering teams to build or utilize unified data layers, ensuring AI tools are powered by a scalable and clean data architecture.
                  - listitem [ref=e206]:
                    - paragraph [ref=e207]: Deep proficiency in the Google Gemini Enterprise suite and the Google Cloud / Vertex AI ecosystem or similar platforms.
                - paragraph [ref=e208]
                - strong [ref=e209]: YOU ARE MADE FOR THIS IF YOU...
                - list [ref=e210]:
                  - listitem [ref=e211]:
                    - paragraph [ref=e212]: Have a strong passion for AI transformation and proactively stay current on emerging tools, technologies, and industry trends
                  - listitem [ref=e213]:
                    - paragraph [ref=e214]: Are execution-oriented and enjoy turning ideas into tangible outcomes, with a focus on delivering measurable business impact
                  - listitem [ref=e215]:
                    - paragraph [ref=e216]: Bring experience in developing ROI models and managing a portfolio of initiatives, using data to inform prioritization and decision-making
                  - listitem [ref=e217]:
                    - paragraph [ref=e218]: Are results-driven, with a focus on metrics such as time-to-value, efficiency, and scalability, rather than theoretical or exploratory work
