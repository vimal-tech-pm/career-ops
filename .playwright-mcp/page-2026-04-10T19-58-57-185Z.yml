                - paragraph [ref=e247]:
                  - strong [ref=e248]:
                    - emphasis [ref=e249]: Fair and Authentic Interview Experience
                - paragraph [ref=e250]:
                  - emphasis [ref=e251]: We welcome candidates using AI tools to prepare for interviews or to learn more about Pelmorex. During the interviews themselves, we expect responses to come from your own experience and thinking.
                - paragraph [ref=e252]:
                  - emphasis [ref=e253]: We ask that candidates not use real-time AI assistance, live answer prompts, or automated response tools during interviews. This helps ensure a fair process for everyone and allows us to evaluate how you approach problems and communicate in your own voice.
                - paragraph [ref=e254]
                - paragraph [ref=e255]: We may use artificial intelligence (AI) tools to support parts of the hiring process, such as reviewing applications, analyzing resumes, or assessing responses. These tools assist our recruitment team but do not replace human judgment. Final hiring decisions are ultimately made by humans. If you would like more information about how your data is processed, please contact us.
